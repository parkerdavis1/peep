<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no""
    />
    <link
      rel="icon"
      type="image/png"
      href="%sveltekit.assets%/icons/favicon-96x96.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="%sveltekit.assets%/icons/favicon.svg"
    />
    <link rel="shortcut icon" href="%sveltekit.assets%/icons/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/icons/apple-touch-icon.png"
    />
    <link rel="manifest" href="%sveltekit.assets%/icons/site.webmanifest" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
